<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WhatsApp Bot Demo</title>
    <style>
        body { font-family: sans-serif; background-color: #ece5dd; display: flex; justify-content: center; padding-top: 50px; }
        .chat-container { width: 350px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: #075e54; color: white; padding: 15px; text-align: center; font-weight: bold; }
        .chat-box { height: 400px; padding: 15px; background: #e5ddd5; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 75%; word-wrap: break-word; }
        .user { background: #dcf8c6; align-self: flex-end; }
        .bot { background: white; align-self: flex-start; }
        .input-box { display: flex; padding: 10px; background: #f0f0f0; }
        input { flex: 1; padding: 10px; border: none; border-radius: 20px; outline: none; }
        button { background: #075e54; color: white; border: none; padding: 10px 15px; margin-left: 10px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">WhatsApp ChatBot</div>
    <div class="chat-box" id="chat-box">
        <div class="msg bot">Send me a message! Try "Hi" or "Bye".</div>
    </div>
    <div class="input-box">
        <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;

        // Show user message
        addMessage(text, 'user');
        input.value = '';

        try {
            // Send to your Spring Boot Backend
            const response = await fetch('/webhook', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await response.json();
            addMessage(data.reply, 'bot');
        } catch (error) {
            addMessage("Backend is not running!", 'bot');
        }
    }

    function addMessage(text, sender) {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${sender}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
